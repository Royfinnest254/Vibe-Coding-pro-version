name: Connex CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 libxml2-utils
        python3 -m pip install pynacl

    - name: Run govulncheck
      uses: golang/govulncheck-action@v1
      with:
        go-version-input: '1.22'
        go-package: ./...

    - name: Build
      run: make build

    - name: Run Tests
      run: go test ./...

    - name: Run Demo Smoke Test
      run: |
        # The demo script is the ultimate CI test
        bash scripts/demo.sh
